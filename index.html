<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslateDu — 한문 불교 문헌 학습 도구</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">

  <!-- ───────── 헤더 ───────── -->
  <header>
    <h1>TranslateDu</h1>
    <p class="subtitle">한문 불교 문헌 구조 분석 · 번역 학습 도구</p>
  </header>

  <!-- ───────── 입력 섹션 ───────── -->
  <section class="input-section">
    <label for="input-text">한문 원문 입력</label>
    <textarea id="input-text" placeholder="분석할 한문 불교 문헌을 입력하세요. 예: 若依一乘此中即具十佛體德用。准以思攝。"></textarea>

    <!-- 번역 방식 선택 탭 -->
    <div class="tab-group">
      <button class="tab-btn active" data-mode="gemini">Gemini API 분석</button>
      <button class="tab-btn" data-mode="manual">로컬 사전 분석</button>
    </div>

    <!-- Gemini 설정 -->
    <div id="gemini-settings">
      <label for="api-key-input">Gemini API Key</label>
      <div class="api-key-group">
        <input type="password" id="api-key-input" placeholder="Google AI Studio에서 발급받은 API Key를 입력하세요">
        <button id="toggle-key-btn" type="button">표시</button>
      </div>
      <label for="model-select">모델 선택</label>
      <select id="model-select" class="model-select">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (기본, 무료)</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (무료, 빠름)</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro (무료, 고품질)</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash (6월 퇴역 예정)</option>
      </select>
    </div>

    <!-- 직접 입력 안내 -->
    <div id="manual-info" class="manual-info" style="display:none;">
      로컬 사전 기반으로 절 분리, 용어 태깅, 기초 품사 분류를 수행합니다.
      Gemini API를 사용하면 3단계 파이프라인(분절→분석→검증)을 통해 더 정확한 분석을 받을 수 있습니다.
    </div>

    <!-- 실행 버튼 -->
    <div class="action-group">
      <button id="analyze-btn" class="btn-primary" type="button">분석 실행</button>
      <button id="clear-btn" class="btn-secondary" type="button">초기화</button>
    </div>
  </section>

  <!-- ───────── 상태 메시지 ───────── -->
  <div id="status-area"></div>

  <!-- ───────── 결과 섹션 ───────── -->
  <section id="results-section">

    <!-- 원문 구조 분석 -->
    <div class="result-block">
      <h3>원문 구조 분석</h3>
      <div id="original-structure"></div>
    </div>

    <!-- 번역문 구조 분석 -->
    <div class="result-block">
      <h3>번역문 구조 분석</h3>
      <div id="translated-structure"></div>
    </div>

    <!-- 원문-번역 대응 관계 -->
    <div class="result-block">
      <h3>원문-번역 대응 관계</h3>
      <div id="alignment-view"></div>
    </div>

    <!-- 문장 구조 해설 -->
    <div class="result-block">
      <h3>문장 구조 해설</h3>
      <div id="explanation-view"></div>
    </div>

    <!-- 핵심 어휘 카드 -->
    <div class="result-block">
      <h3>핵심 어휘 카드</h3>
      <div id="vocabulary-cards"></div>
    </div>

  </section>

  <!-- ───────── 푸터 ───────── -->
  <footer>
    TranslateDu — 로컬 실행 전용 학습 도구 · 분석 결과는 학술적 참고용이며 최종 판단은 연구자의 몫입니다.
  </footer>

</div>

<!-- ───────── 스크립트 로드 (의존성 순서 준수) ───────── -->
<script src="utils.js"></script>
<script src="glossary.js"></script>
<script src="prompts.js"></script>
<script src="storage.js"></script>
<script src="parser.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>

</body>
</html>
